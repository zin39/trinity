<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8892A"/>
    </linearGradient>
  </defs>

  <g transform="translate(60, 68)">
    <!-- Golden swoosh arcs -->
    <path d="M-38,18 Q-14,-20 8,-13 Q30,-5 48,8 Q62,20 52,14" fill="none" stroke="url(#goldGrad)" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M-26,22 Q2,-14 20,-8 Q42,2 56,18" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

    <!-- Letter K -->
    <text font-family="Georgia, 'Times New Roman', serif" font-size="74" font-style="italic" font-weight="400" fill="#4A2810" text-anchor="middle" x="-18" y="14" dominant-baseline="central">K</text>

    <!-- Letter S in gold -->
    <text font-family="Georgia, 'Times New Roman', serif" font-size="68" font-style="italic" font-weight="400" fill="#C09528" text-anchor="middle" x="30" y="10" dominant-baseline="central">S</text>

    <!-- Sun motif -->
    <circle cx="50" cy="-34" r="4.5" fill="#C09528"/>
    <g stroke="#C09528" stroke-width="1.3" stroke-linecap="round">
      <line x1="50" y1="-45" x2="50" y2="-42"/>
      <line x1="50" y1="-26" x2="50" y2="-23"/>
      <line x1="39" y1="-34" x2="42" y2="-34"/>
      <line x1="58" y1="-34" x2="61" y2="-34"/>
      <line x1="42.2" y1="-41.8" x2="44.5" y2="-39.5"/>
      <line x1="55.5" y1="-28.5" x2="57.8" y2="-26.2"/>
      <line x1="42.2" y1="-26.2" x2="44.5" y2="-28.5"/>
      <line x1="55.5" y1="-39.5" x2="57.8" y2="-41.8"/>
    </g>
  </g>
</svg>
