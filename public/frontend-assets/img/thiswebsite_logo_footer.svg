<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 115" width="520" height="115">
  <defs>
    <linearGradient id="goldGradF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8892A"/>
    </linearGradient>
  </defs>

  <!-- KS Monogram Group -->
  <g transform="translate(65, 58)">
    <!-- Golden swoosh arcs -->
    <path d="M-40,18 Q-15,-18 8,-12 Q30,-5 48,8 Q65,22 55,15" fill="none" stroke="url(#goldGradF)" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M-28,22 Q2,-14 20,-8 Q42,2 58,18" fill="none" stroke="url(#goldGradF)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

    <!-- Letter K -->
    <text font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" font-weight="400" fill="#FAF8F2" text-anchor="middle" x="-18" y="14" dominant-baseline="central">K</text>

    <!-- Letter S in gold -->
    <text font-family="Georgia, 'Times New Roman', serif" font-size="66" font-style="italic" font-weight="400" fill="#C8A46A" text-anchor="middle" x="30" y="10" dominant-baseline="central">S</text>

    <!-- Sun motif -->
    <circle cx="50" cy="-32" r="4.2" fill="#C8A46A"/>
    <g stroke="#C8A46A" stroke-width="1.2" stroke-linecap="round">
      <line x1="50" y1="-42" x2="50" y2="-39"/>
      <line x1="50" y1="-25" x2="50" y2="-22"/>
      <line x1="40" y1="-32" x2="43" y2="-32"/>
      <line x1="57" y1="-32" x2="60" y2="-32"/>
      <line x1="43" y1="-39" x2="45.2" y2="-36.8"/>
      <line x1="54.8" y1="-27.2" x2="57" y2="-25"/>
      <line x1="43" y1="-25" x2="45.2" y2="-27.2"/>
      <line x1="54.8" y1="-36.8" x2="57" y2="-39"/>
    </g>
  </g>

  <!-- Main Name -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic" font-weight="400" x="140" y="62" fill="#FAF8F2">Karissa</text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic" font-weight="400" x="310" y="62" fill="#C8A46A">Subedi</text>

  <!-- Dashes flanking subtitle -->
  <line x1="140" y1="90" x2="178" y2="90" stroke="#C8A46A" stroke-width="1" opacity="0.7"/>
  <line x1="453" y1="90" x2="491" y2="90" stroke="#C8A46A" stroke-width="1" opacity="0.7"/>

  <!-- Career Consultancy Services -->
  <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="3.5" x="185" y="94" fill="rgba(250,248,242,0.85)">CAREER CONSULTANCY SERVICES</text>
</svg>
